services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: gushi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gushi
      POSTGRES_PASSWORD: gushi_dev
      POSTGRES_DB: gushi_dev
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gushi -d gushi_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 应用服务（生产环境）
  gushi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gushi-app
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://gushi:gushi_dev@postgres:5432/gushi_dev
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AUTH_TRUST_HOST=true
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - AI_IMAGE_PROVIDER=${AI_IMAGE_PROVIDER}
      - AI_IMAGE_API_KEY=${AI_IMAGE_API_KEY}
      - AI_IMAGE_BASE_URL=${AI_IMAGE_BASE_URL}
      - AI_IMAGE_MODEL=${AI_IMAGE_MODEL}
    volumes:
      - ./public/generated-images:/app/public/generated-images
      - ./backups:/app/backups
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 开发环境服务（可选，用于本地热重载开发）
  gushi-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gushi-dev
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://gushi:gushi_dev@postgres:5432/gushi_dev
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - AUTH_TRUST_HOST=true
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - AI_IMAGE_PROVIDER=${AI_IMAGE_PROVIDER}
      - AI_IMAGE_API_KEY=${AI_IMAGE_API_KEY}
      - AI_IMAGE_BASE_URL=${AI_IMAGE_BASE_URL}
      - AI_IMAGE_MODEL=${AI_IMAGE_MODEL}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: npm run dev
    profiles:
      - dev

  # Redis 缓存服务（可选）
  gushi-redis:
    image: redis:7-alpine
    container_name: gushi-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - redis

  # Nginx 反向代理（可选，需要先配置 nginx.conf 和 ssl 证书）
  gushi-nginx:
    image: nginx:alpine
    container_name: gushi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - gushi-app
    restart: unless-stopped
    profiles:
      - nginx

volumes:
  postgres_data:
  redis_data:
  node_modules:
